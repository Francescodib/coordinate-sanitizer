name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Integration tests
        run: npm run test:integration

  publish:
    name: Publish
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC Trusted Publishing
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm (Trusted Publishing requires npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Debug environment
        run: |
          echo "npm: $(npm --version)"
          echo "node: $(node --version)"
          echo "OIDC URL available: ${ACTIONS_ID_TOKEN_REQUEST_URL:+yes}"

      - name: Publish
        run: npm publish --access public --loglevel=verbose

      - name: Show npm debug log on failure
        if: failure()
        run: cat /home/runner/.npm/_logs/*.log 2>/dev/null | tail -200 || true
